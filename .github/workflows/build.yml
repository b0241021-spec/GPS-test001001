name: Manus Clean Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 解壓縮 Manus AI 給您的原始碼 ZIP 檔
    - name: Unzip Project
      run: |
        unzip -q *.zip || true
        rm -f *.zip

    # 2. 暴力大搬移：尋找 settings.gradle 並把所有專案內容強制抓到最外層
    - name: Force Relocate Files
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle" -print -quit)
        if [ -z "$SETTINGS_PATH" ]; then
          echo "在整個壓縮包內找不到 settings.gradle！請確認 ZIP 是否正確！"
          exit 1
        fi
        REAL_ROOT=$(dirname "$SETTINGS_PATH")
        if [ "$REAL_ROOT" != "." ]; then
          cp -r "$REAL_ROOT"/* . 2>/dev/null || true
          cp -r "$REAL_ROOT"/.* . 2>/dev/null || true
        fi
        ls -la

    # 3. 部署 Java 17 執行環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 生成全新的原生 Gradle 執行檔環境（完全取代 Manus 缺漏的部分）
    - name: Generate Fresh Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    # 5. 線上打包 APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    # 6. 上傳最終 APK
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GPS-App-Successful-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
